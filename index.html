<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="CareSync - Medicine reminder app for Alzheimer's patients">
  <title>CareSync Reminder</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    /* High-contrast, highly readable UI */
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #f4f4f9; 
      color: #111; 
      text-align: center; 
      padding: 15px; 
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .header h1 { font-size: 2.2rem; color: #2c3e50; margin: 20px 0 5px 0; }
    .clock { font-size: 5rem; font-weight: bold; margin: 10px 0 30px 0; color: #e74c3c; font-variant-numeric: tabular-nums; }
    
    .schedule-list { text-align: left; background: #fff; padding: 20px; border-radius: 12px; margin: 0 auto; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .schedule-list h3 { margin-top: 0; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .schedule-item { font-size: 1.2rem; padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;}
    .taken-text { color: #27ae60; font-weight: bold; }
    .pending-text { color: #e67e22; font-weight: bold; }

    /* The Active Alert Card */
    .med-card { 
      background: white; 
      padding: 35px 20px; 
      border-radius: 16px; 
      margin: 20px auto; 
      max-width: 400px; 
      box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4); 
      border: 4px solid #e74c3c; 
      animation: pulseAlert 2s infinite;
    }
    
    .med-name { font-size: 2.5rem; font-weight: 900; color: #c0392b; line-height: 1.2; }
    .med-time { font-size: 1.5rem; color: #555; margin: 15px 0; }
    
    .btn { 
      background: #27ae60; color: white; border: none; padding: 25px; font-size: 2rem; 
      border-radius: 12px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; 
      box-shadow: 0 6px 0 #1e8449; transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: translateY(6px); box-shadow: 0 0 0 #1e8449; }
    .btn:hover { opacity: 0.9; }
    
    .btn-test { background: #34495e; font-size: 1.1rem; padding: 15px; margin: 20px auto; box-shadow: 0 4px 0 #2c3e50; max-width: 300px;}
    .btn-reset { background: #95a5a6; font-size: 1rem; padding: 10px; margin-top: 20px; width: 100%; max-width: 300px; box-shadow: 0 3px 0 #7f8c8d; }
    .hidden { display: none !important; }
    .error-msg { background: #e74c3c; color: white; padding: 15px; border-radius: 8px; margin: 10px auto; max-width: 400px; }
    .success-msg { background: #27ae60; color: white; padding: 15px; border-radius: 8px; margin: 10px auto; max-width: 400px; }

    /* Footer Credits */
    .footer { margin-top: auto; padding: 20px 0; font-size: 0.9rem; color: #95a5a6; font-weight: bold; }

    @keyframes pulseAlert {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
      70% { transform: scale(1.02); box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .pop-in { animation: popIn 0.5s; }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="header-title">Current Time</h1>
    <div class="clock" id="clock" role="status" aria-live="polite" aria-label="Current time">00:00</div>
  </div>

  <button id="notify-btn" class="btn btn-test" onclick="requestPermissions()" aria-label="Enable device notifications for medicine reminders">Enable Device Alerts</button>

  <div id="error-container"></div>

  <div id="medicine-container" role="main" aria-label="Medicine schedule and alerts">
    <!-- Active alerts replace this content -->
    <div class="schedule-list" id="schedule-list" role="region" aria-label="Today's medicine schedule">
      <h3>Today's Schedule</h3>
      <!-- Populated by JS -->
    </div>
  </div>

  <div class="footer">
    Designed & Developed for Alzheimer's Patient Care
  </div>

  <script>
    'use strict';

    // --- CONFIGURATION ---
    const CONFIG = {
      WEBHOOK_URL: localStorage.getItem('webhook_url') || null,
      CHECK_INTERVAL: 1000, // Check time every second
      ALERT_SOUND_INTERVAL: 5000, // Beep every 5 seconds
      CAREGIVER_TIMEOUT: 30 * 60 * 1000 // 30 minutes
    };

    // --- UTILITY FUNCTIONS ---
    function showError(message) {
      const container = document.getElementById('error-container');
      if (!container) return;
      
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.textContent = message;
      errorDiv.setAttribute('role', 'alert');
      container.appendChild(errorDiv);
      
      setTimeout(() => errorDiv.remove(), 5000);
      console.error('ERROR:', message);
    }

    function showSuccess(message) {
      const container = document.getElementById('error-container');
      if (!container) return;
      
      const successDiv = document.createElement('div');
      successDiv.className = 'success-msg';
      successDiv.textContent = message;
      container.appendChild(successDiv);
      
      setTimeout(() => successDiv.remove(), 3000);
    }

    function formatTime(date) {
      if (!(date instanceof Date)) return null;
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // --- 1. SERVICE WORKER & NOTIFICATIONS ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.warn('Service Worker registration failed:', err));
      });
    }

    // Hide notify button if already granted
    if ("Notification" in window && Notification.permission === "granted") {
      document.getElementById('notify-btn').classList.add('hidden');
    }

    function requestPermissions() {
      if ("Notification" in window) {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            document.getElementById('notify-btn').classList.add('hidden');
            showSuccess("Alerts enabled successfully!");
          } else {
            showError("Notifications permission denied. Reminders may not work.");
          }
        }).catch(err => {
          showError("Failed to request notification permission: " + err.message);
        });
      } else {
        showError("Your device does not support notifications.");
      }
    }

    // --- 2. AUDIO ALARM SYNTHESIZER ---
    function playBeep() {
      try {
        if (!window.AudioContext && !window.webkitAudioContext) {
          console.warn("AudioContext not supported");
          return;
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        osc.type = 'square'; // Harsh, noticeable sound
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        
        // Pulse the volume
        gainNode.gain.setValueAtTime(1, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } catch (e) {
        console.warn("Audio playback unavailable:", e.message);
      }
    }

    // --- 3. DATA & LOCAL STORAGE ---
    const defaultSchedule = [
      { id: 1, name: "Heart Pill (Lisinopril)", time: "09:00", taken: false, alerted: false },
      { id: 2, name: "Memory Med (Donepezil)", time: "20:00", taken: false, alerted: false }
    ];

    let schedule = [];
    let alertSoundInterval = null;

    function loadSchedule() {
      try {
        schedule = JSON.parse(localStorage.getItem('caresync_data')) || defaultSchedule;
        validateSchedule();
      } catch (e) {
        console.error('Failed to load schedule:', e);
        schedule = defaultSchedule;
      }
    }

    function validateSchedule() {
      // Ensure all required fields exist
      schedule = schedule.map(med => ({
        id: med.id || Date.now(),
        name: med.name || 'Unknown Medicine',
        time: med.time || '00:00',
        taken: !!med.taken,
        alerted: !!med.alerted
      }));
    }

    function saveSchedule() {
      try {
        localStorage.setItem('caresync_data', JSON.stringify(schedule));
        renderScheduleList();
      } catch (e) {
        showError('Failed to save schedule: ' + e.message);
      }
    }

    function renderScheduleList() {
      const listDiv = document.getElementById('schedule-list');
      if (!listDiv) return;
      
      try {
        let html = `<h3>Today's Schedule</h3>`;
        
        if (schedule.length === 0) {
          html += `<p style="color: #95a5a6;">No medicines scheduled for today.</p>`;
        } else {
          schedule.forEach(med => {
            const status = med.taken 
              ? `<span class="taken-text">Taken ✓</span>` 
              : `<span class="pending-text">Pending</span>`;
            html += `<div class="schedule-item"><span><b>${med.time}</b> - ${med.name}</span> ${status}</div>`;
          });
        }
        
        html += `<button onclick="window.resetDay()" class="btn-reset" aria-label="Reset schedule for new day">Reset Schedule for New Day</button>`;
        
        listDiv.innerHTML = html;
      } catch (e) {
        showError('Failed to render schedule: ' + e.message);
      }
    }

    window.resetDay = function() {
      try {
        schedule = defaultSchedule.map(med => ({...med, taken: false, alerted: false}));
        saveSchedule();
        showSuccess('Schedule reset for new day!');
      } catch (e) {
        showError('Failed to reset schedule: ' + e.message);
      }
    }

    // --- 4. CLOCK & ALERT LOGIC ---
    function updateClock() {
      try {
        const now = new Date();
        const timeString = formatTime(now);
        
        if (!timeString) {
          console.error('Failed to format time');
          return;
        }

        const clockElement = document.getElementById('clock');
        if (clockElement) {
          clockElement.innerText = timeString;
        }
        
        checkMedicines(timeString);
      } catch (e) {
        console.error('Clock update error:', e);
      }
    }

    function checkMedicines(currentTime) {
      if (!currentTime || typeof currentTime !== 'string') return;

      const container = document.getElementById('medicine-container');
      if (!container) return;

      try {
        schedule.forEach(med => {
          if (med.time === currentTime && !med.taken && !med.alerted) {
            triggerMedicineAlert(med, container);
          }
        });
      } catch (e) {
        console.error('Medicine check error:', e);
      }
    }

    function triggerMedicineAlert(med, container) {
      try {
        med.alerted = true;
        saveSchedule();
        
        // 1. Show massive UI Alert
        container.innerHTML = `
          <div class="med-card">
            <div class="med-name">TAKE NOW:<br>${med.name}</div>
            <div class="med-time">Scheduled at: ${med.time}</div>
            <button class="btn" onclick="window.markTaken(${med.id})" aria-label="Mark medicine as taken">I TOOK IT</button>
          </div>
        `;

        // 2. Play Audio & Push Notification
        if ("Notification" in window && Notification.permission === "granted") {
          try {
            new Notification("Medicine Time!", { 
              body: `It's time to take your ${med.name}`, 
              icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%233498db'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='central'>💊</text></svg>",
              requireInteraction: true,
              tag: 'medicine-alert-' + med.id
            });
          } catch (e) {
            console.warn('Notification failed:', e);
          }
        }
        
        playBeep();
        alertSoundInterval = setInterval(playBeep, CONFIG.ALERT_SOUND_INTERVAL);

        // 3. Start Caregiver Alert Countdown
        setTimeout(() => {
          try {
            const currentData = JSON.parse(localStorage.getItem('caresync_data')) || schedule;
            const checkMed = currentData.find(m => m.id === med.id);
            if (checkMed && !checkMed.taken) {
              triggerCaregiverAlert(med.name);
            }
          } catch (e) {
            console.error('Caregiver alert check failed:', e);
          }
        }, CONFIG.CAREGIVER_TIMEOUT);

      } catch (e) {
        showError('Failed to trigger medicine alert: ' + e.message);
      }
    }

    // --- 5. ACTIONS ---
    window.markTaken = function(id) {
      try {
        if (alertSoundInterval) {
          clearInterval(alertSoundInterval);
        }
        
        const med = schedule.find(m => m.id === id);
        if (med) {
          med.taken = true;
          saveSchedule();
          
          const container = document.getElementById('medicine-container');
          if (container) {
            container.innerHTML = `
              <h2 style="color: #27ae60; font-size: 2.5rem; margin-top: 40px;" class="pop-in" aria-live="polite">
                Great job! ✓
              </h2>
            `;
            
            // Return to normal schedule view after 3 seconds
            setTimeout(() => {
              container.innerHTML = `<div class="schedule-list" id="schedule-list"></div>`;
              renderScheduleList();
            }, 3000);
          }
        }
      } catch (e) {
        showError('Failed to mark medicine as taken: ' + e.message);
      }
    }

    function triggerCaregiverAlert(medName) {
      try {
        console.log(`🚨 CAREGIVER ALERT: Missed ${medName}`);
        
        if (!CONFIG.WEBHOOK_URL) {
          console.warn('Webhook URL not configured. Set it in settings.');
          return;
        }
        
        fetch(CONFIG.WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message: `URGENT: Patient missed their ${medName} dose.`,
            timestamp: new Date().toISOString()
          })
        }).catch(err => {
          console.warn("Webhook delivery failed:", err.message);
        });
      } catch (e) {
        console.error('Caregiver alert error:', e);
      }
    }

    // --- INITIALIZATION ---
    try {
      loadSchedule();
      renderScheduleList();
      setInterval(updateClock, CONFIG.CHECK_INTERVAL);
      updateClock();
      console.log('CareSync initialized successfully');
    } catch (e) {
      showError('Failed to initialize app: ' + e.message);
      console.error('Initialization error:', e);
    }
  </script>
</body>
</html>
